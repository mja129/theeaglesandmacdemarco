<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>The Eagles and Mac Demarco</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <div id="login-section">
      <div class="login-card">
        <svg class="spotify-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <h1>The Eagles and Mac Demarco</h1>
        <p class="tagline">Ever wanted a programmatically built cluster fuck of a playlist with whatever the fuck you want in it? Congratulations!</p>
        <button id="login-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
          </svg>
          Continue with Spotify
        </button>
      </div>
    </div>

    <div id="app-section">
      <div id="container">
        <header>
          <h1>The Eagles and Mac Demarco</h1>
          <button id="logout-btn">Log out</button>
        </header>

        <div id="search-wrapper">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M21.53 20.47l-3.66-3.66A8 8 0 1 0 4 12a8 8 0 0 0 13.28 5.87l3.65 3.66a.75.75 0 0 0 1.06-1.06zM6 12a6 6 0 1 1 12 0A6 6 0 0 1 6 12z"/>
            </svg>
          </span>
          <input
            type="text"
            id="search-input"
            placeholder="Search for an artist..."
            autocomplete="off"
          >
          <div id="search-results"></div>
        </div>

        <div id="artist-list"></div>

        <div id="settings">
          <label for="songs-per-artist">Songs per artist</label>
          <input type="number" id="songs-per-artist" value="3" min="1">
          <label for="playlist-name">Playlist name</label>
          <input type="text" id="playlist-name" placeholder="My Mixed Playlist">
        </div>

        <button id="create-btn">Create Playlist</button>
        <div id="status"></div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
